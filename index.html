<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Trips</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
    }

    #map {
      width: 100%;
      height: 100vh;
      min-height: 500px; /* Minimum height for iFrame embedding */
    }

    .filters {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      background: white;
      border: none;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: all 0.15s;
      color: #444;
    }

    .chip.active {
      background: #E84855;
      color: white;
    }

    .mapboxgl-popup-content {
      border-radius: 10px;
      padding: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      width: 200px;
      overflow: hidden;
    }

    .popup-slides {
      display: flex;
      transition: transform 0.3s ease;
    }

    .popup-slides.slid {
      transform: translateX(-200px);
    }

    .popup-slide {
      width: 200px;
      flex-shrink: 0;
      padding: 14px 16px;
    }

    .popup-title {
      font-size: 14px;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }

    .popup-link {
      font-size: 12px;
      color: #E84855;
      text-decoration: none;
      font-weight: 500;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    .popup-link:hover { text-decoration: underline; }

    .popup-back {
      background: none;
      border: none;
      font-size: 11px;
      color: #888;
      cursor: pointer;
      padding: 0;
      margin-bottom: 8px;
      display: block;
    }

    .popup-back:hover { color: #444; }

    .popup-links-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .popup-links-list a {
      font-size: 12px;
      color: #E84855;
      text-decoration: none;
      font-weight: 500;
    }

    .popup-links-list a:hover { text-decoration: underline; }

    .pin {
      width: 32px;
      height: 32px;
      cursor: pointer;
      transition: transform 0.15s;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
    }

    .pin:hover { transform: scale(1.3); }
  </style>
</head>
<body>


<div class="filters">
  <div class="chip active" onclick="filterPins('all', event)">All</div>
  <div class="chip" onclick="filterPins('seattle', event)">Seattle</div>
  <div class="chip" onclick="filterPins('skagit', event)">Skagit</div>
</div>
<div id="map"></div>

<script>
  // Token will be injected from .env during build
  mapboxgl.accessToken = 'TOKEN_PLACEHOLDER';

  let map;
  try {
    map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/outdoors-v12',
      center: [-122.33, 47.6],
      zoom: 10,
      attributionControl: false
    });

    map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');
    map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-left');

    console.log('Map initialized successfully');
  } catch (error) {
    console.error('Error initializing map:', error);
  }

  // Load trips from external JSON file
  let trips = [];
  let mapLoaded = false;
  
  fetch('trips.json')
    .then(response => response.json())
    .then(data => {
      trips = data;
      if (mapLoaded) {
        addMarkersToMap();
      }
    })
    .catch(error => {
      console.error('Error loading trips:', error);
      const el = document.createElement('div');
      el.style.cssText = 'position:absolute;top:16px;right:16px;z-index:10;background:white;padding:10px 14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-size:13px;color:#c00;';
      el.textContent = 'Could not load trip data. Please refresh.';
      document.body.appendChild(el);
    });

  const markers = [];

  function addMarkersToMap() {
    trips.forEach(trip => {
      const el = document.createElement('div');
      el.className = 'pin';
      el.innerHTML = getPinSVG(trip.type);

      const popup = new mapboxgl.Popup({ offset: 18, closeButton: false })
        .setHTML(buildPopupHTML(trip));

      const marker = new mapboxgl.Marker(el)
        .setLngLat(trip.coords)
        .setPopup(popup)
        .addTo(map);

      markers.push({ marker, el, region: trip.region });
    });
  }

  // Initialize map and load markers when map is ready
  map.on('load', () => {
    mapLoaded = true;
    if (trips.length > 0) {
      addMarkersToMap();
    }
  });

  function getPinSVG(type) {
    if (type === 'walking') {
      return `<span style="font-size:24px;line-height:32px;display:block;text-align:center;">🚶‍♀️</span>`;
    }
    // default: sakura
    return `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
      <g transform="translate(16,16)">
        <ellipse cx="0" cy="-6" rx="4" ry="6.5" fill="#FFB7C5" transform="rotate(0)"/>
        <ellipse cx="0" cy="-6" rx="4" ry="6.5" fill="#FFB7C5" transform="rotate(72)"/>
        <ellipse cx="0" cy="-6" rx="4" ry="6.5" fill="#FFB7C5" transform="rotate(144)"/>
        <ellipse cx="0" cy="-6" rx="4" ry="6.5" fill="#FFB7C5" transform="rotate(216)"/>
        <ellipse cx="0" cy="-6" rx="4" ry="6.5" fill="#FFB7C5" transform="rotate(288)"/>
        <circle cx="0" cy="0" r="3.5" fill="#FF85A1"/>
      </g>
    </svg>`;
  }

  function buildPopupHTML(trip) {
    if (!trip.links || trip.links.length === 0) {
      return `<div class="popup-slides">
        <div class="popup-slide">
          <div class="popup-title">${trip.name}</div>
        </div>
      </div>`;
    }
    if (trip.links.length === 1) {
      return `<div class="popup-slides">
        <div class="popup-slide">
          <div class="popup-title">${trip.name}</div>
          <a class="popup-link" href="${trip.links[0].url}" target="_blank" rel="noopener noreferrer">Click Here for Inspo!</a>
        </div>
      </div>`;
    }
    const items = trip.links.map(l =>
      `<a href="${l.url}" target="_blank" rel="noopener noreferrer">${l.label}</a>`
    ).join('');
    return `<div class="popup-slides">
      <div class="popup-slide">
        <div class="popup-title">${trip.name}</div>
        <button class="popup-link" onclick="slidePopupForward(this)">Click Here for Inspo! →</button>
      </div>
      <div class="popup-slide">
        <button class="popup-back" onclick="slidePopupBack(this)">← Back</button>
        <div class="popup-links-list">${items}</div>
      </div>
    </div>`;
  }

  function slidePopupForward(btn) {
    btn.closest('.popup-slides').classList.add('slid');
  }

  function slidePopupBack(btn) {
    btn.closest('.popup-slides').classList.remove('slid');
  }

  const regionViews = {
    seattle: { center: [-122.33, 47.6], zoom: 10 },
    skagit:  { center: [-122.334, 48.42], zoom: 11 },
  };

  function filterPins(region, event) {
    // Update chip styles
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');

    // Show/hide markers
    markers.forEach(({ el, region: r }) => {
      el.style.display = (region === 'all' || region === r) ? 'block' : 'none';
    });

    // Fly to region if a view is defined
    if (regionViews[region]) {
      map.flyTo({ ...regionViews[region], duration: 1200 });
    }
  }
</script>

</body>
</html>

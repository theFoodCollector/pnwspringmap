<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Trips</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
    }

    #map {
      width: 100%;
      height: 100vh;
      min-height: 500px; /* Minimum height for iFrame embedding */
    }

    .filters {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      background: white;
      border: none;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: all 0.15s;
      color: #444;
    }

    .chip.active {
      background: #E84855;
      color: white;
    }

    .mapboxgl-popup-content {
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      min-width: 180px;
    }

    .popup-title {
      font-size: 14px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }

    .popup-meta {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }

    .popup-link {
      font-size: 12px;
      color: #E84855;
      text-decoration: none;
      font-weight: 500;
    }

    .popup-link:hover { text-decoration: underline; }

    .pin {
      width: 14px;
      height: 14px;
      background: #E84855;
      border: 2.5px solid white;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.15s;
    }

    .pin:hover { transform: scale(1.4); }
  </style>
</head>
<body>


<div class="filters">
  <div class="chip active" onclick="filterPins('all', event)">All</div>
  <div class="chip" onclick="filterPins('seattle', event)">Seattle</div>
  <div class="chip" onclick="filterPins('skagit', event)">Skagit</div>
</div>
<div id="map"></div>

<script>
  // Token will be injected from .env during build
  mapboxgl.accessToken = 'TOKEN_PLACEHOLDER';

  let map;
  try {
    map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/outdoors-v12',
      center: [-122.33, 47.6],
      zoom: 10,
      attributionControl: false
    });

    map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');
    map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-left');

    console.log('Map initialized successfully');
  } catch (error) {
    console.error('Error initializing map:', error);
  }

  // Load trips from external JSON file
  let trips = [];
  let mapLoaded = false;
  
  fetch('trips.json')
    .then(response => response.json())
    .then(data => {
      trips = data;
      if (mapLoaded) {
        addMarkersToMap();
      }
    })
    .catch(error => {
      console.error('Error loading trips:', error);
      const el = document.createElement('div');
      el.style.cssText = 'position:absolute;top:16px;right:16px;z-index:10;background:white;padding:10px 14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-size:13px;color:#c00;';
      el.textContent = 'Could not load trip data. Please refresh.';
      document.body.appendChild(el);
    });

  const markers = [];

  function addMarkersToMap() {
    trips.forEach(trip => {
      const el = document.createElement('div');
      el.className = 'pin';

      const popup = new mapboxgl.Popup({ offset: 18, closeButton: false })
        .setHTML(`
          <div class="popup-title">${trip.name}</div>
          <a class="popup-link" href="${trip.postUrl}" target="_blank" rel="noopener noreferrer">
            Click Here for Inspo!
          </a>
        `);

      const marker = new mapboxgl.Marker(el)
        .setLngLat(trip.coords)
        .setPopup(popup)
        .addTo(map);

      markers.push({ marker, el, region: trip.region });
    });
  }

  // Initialize map and load markers when map is ready
  map.on('load', () => {
    mapLoaded = true;
    if (trips.length > 0) {
      addMarkersToMap();
    }
  });

  function filterPins(region, event) {
    // Update chip styles
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');

    // Show/hide markers
    markers.forEach(({ el, region: r }) => {
      el.style.display = (region === 'all' || region === r) ? 'block' : 'none';
    });
  }
</script>

</body>
</html>
